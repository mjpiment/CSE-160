<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Vector Drawing</title>
        <style>
            body {
                font-family: sans-serif;
                background: #1e1e2e;
                color: #cdd6f4;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 24px;
                gap: 16px;
            }
            .author-card {
                background: #313244;
                border-radius: 8px;
                padding: 12px 20px;
                width: 380px;
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .author-card .name {
                font-size: 1rem;
                font-weight: bold;
                color: #cdd6f4;
            }
            .author-card .email {
                font-size: 0.85rem;
                color: #89b4fa;
            }
            canvas {
                border: 2px solid #45475a;
                border-radius: 6px;
            }
            .controls {
                display: flex;
                flex-direction: column;
                gap: 10px;
                background: #313244;
                padding: 16px 20px;
                border-radius: 8px;
                width: 380px;
            }
            .section-label {
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: #6c7086;
                margin-bottom: 2px;
            }
            .vector-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .vector-field {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .vector-field label {
                font-size: 0.8rem;
                color: #a6adc8;
            }
            input[type="number"] {
                width: 100%;
                box-sizing: border-box;
                padding: 5px 8px;
                border-radius: 4px;
                border: 1px solid #585b70;
                background: #1e1e2e;
                color: #cdd6f4;
                font-size: 0.9rem;
            }
            select {
                padding: 5px 8px;
                border-radius: 4px;
                border: 1px solid #585b70;
                background: #1e1e2e;
                color: #cdd6f4;
                font-size: 0.9rem;
                flex: 1;
            }
            input[type="button"] {
                padding: 6px 16px;
                border-radius: 4px;
                border: none;
                background: #89b4fa;
                color: #1e1e2e;
                font-weight: bold;
                cursor: pointer;
                font-size: 0.9rem;
            }
            input[type="button"]:hover {
                background: #74c7ec;
            }
            .row {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            hr {
                border: none;
                border-top: 1px solid #45475a;
                margin: 2px 0;
            }
            .notes-card {
                background: #313244;
                border-radius: 8px;
                padding: 14px 20px;
                width: 380px;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .notes-card .section-label {
                margin-bottom: 0;
            }
            textarea {
                background: #1e1e2e;
                color: #cdd6f4;
                border: 1px solid #585b70;
                border-radius: 4px;
                padding: 8px;
                font-family: sans-serif;
                font-size: 0.85rem;
                resize: vertical;
                min-height: 60px;
            }
        </style>
    </head>

    <body onload="main()">
        <div class="author-card">
            <span class="name">Michael Pimentel</span>
            <span class="email">mjpiment@ucsc.edu</span>
        </div>

        <canvas id="example" width="400" height="400">
            Please use a browser that supports "canvas"
        </canvas>

        <div class="controls">
            <div class="section-label">Vectors</div>
            <div class="vector-grid">
                <div class="vector-field">
                    <label>x1</label>
                    <input type="number" id="x1" value="2.25"/>
                </div>
                <div class="vector-field">
                    <label>x2</label>
                    <input type="number" id="x2" value="2.25"/>
                </div>
                <div class="vector-field">
                    <label>y1</label>
                    <input type="number" id="y1" value="-1"/>
                </div>
                <div class="vector-field">
                    <label>y2</label>
                    <input type="number" id="y2" value="3"/>
                </div>
            </div>
            <input type="button" value="Draw" onclick="handleDrawEvent()"/>

            <hr/>

            <div class="section-label">Operations</div>
            <div class="row">
                <select id="operation">
                    <option value="add">add</option>
                    <option value="sub">sub</option>
                    <option value="mul">mul</option>
                    <option value="div">div</option>
                    <option value="magnitude">magnitude</option>
                    <option value="normalize">normalize</option>
                    <option value="angleBetween">angleBetween</option>
                    <option value="area">area</option>
                </select>
                <div class="vector-field" style="flex:1">
                    <label>Scalar</label>
                    <input type="number" id="scalar" value="2"/>
                </div>
            </div>
            <input type="button" value="Draw Operation" onclick="handleDrawOperationEvent()"/>
        </div>

        <div class="notes-card">
            <div class="section-label">Notes to Grader</div>
            <textarea placeholder="Leave notes here..."></textarea>
        </div>

        <script src="lib/cuon-matrix-cse160.js"></script>
        <script src="asg0.js"></script>
    </body>
</html>
