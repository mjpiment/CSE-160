<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Blocky Eagle</title>
    <style>
      body { font-family: monospace; background: #1a1a2e; color: #eee; margin: 16px; }
      canvas { display: block; border: 2px solid #444; }
      label { display: inline-block; width: 160px; }
      input[type=range] { width: 200px; vertical-align: middle; }
      .row { margin: 4px 0; }
      button { margin-right: 6px; padding: 4px 10px; }
    </style>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="600" height="500">
      Please use a browser that supports "canvas"
    </canvas>

    <div class="row" style="margin-top:10px">
      <button id="animationOnButton">Animation ON</button>
      <button id="animationOffButton">Animation OFF</button>
      <button id="pokeButton">Poke! (or Shift+Click canvas)</button>
    </div>

    <div class="row">
      Canvas size:
      <button onclick="resizeCanvas(400)">400</button>
      <button onclick="resizeCanvas(600)">600</button>
      <button onclick="resizeCanvas(800)">800</button>
      <button onclick="resizeCanvas('full')">Fullscreen</button>
    </div>

    <div class="row"><label>Camera X tilt</label>
      <input type="range" min="-90" max="90"  value="15"  id="angleXSlide"></div>
    <div class="row"><label>Camera Y spin</label>
      <input type="range" min="0"   max="360" value="30"  id="angleYSlide"></div>

    <div class="row"><label>Wing shoulder</label>
      <input type="range" min="-70" max="70"  value="0"   id="wingSlide"></div>
    <div class="row"><label>Wing elbow</label>
      <input type="range" min="-60" max="60"  value="0"   id="wingMidSlide"></div>
    <div class="row"><label>Wing wrist</label>
      <input type="range" min="-50" max="50"  value="0"   id="wingTipSlide"></div>

    <div class="row"><label>Head turn</label>
      <input type="range" min="-60" max="60"  value="0"   id="headTurnSlide"></div>

    <div class="row"><label>Leg swing</label>
      <input type="range" min="-40" max="40"  value="0"   id="legSwingSlide"></div>
    <div class="row"><label>Knee bend</label>
      <input type="range" min="0"   max="90"  value="0"   id="kneeBendSlide"></div>

    <p id="numdot">Performance: Loading...</p>

    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix.js"></script>

    <script src="Cube.js"></script>
    <script src="Shapes.js"></script>
    <script src="BlockyAnimal.js"></script>
  </body>
</html>
